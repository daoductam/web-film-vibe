# Application Configuration
spring:
  application:
    name: web-film-backend

  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/webfilmanime?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:TaM123456789@}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Multipart file upload (for avatar images)
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

# Server Configuration
server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

# Application Custom Configuration
app:
  crawler:
    ophim-base-url: ${OPHIM_BASE_URL:https://ophim1.com}
    nguonc-base-url: ${NGUONC_BASE_URL:https://phim.nguonc.com/api}
    kkphim-base-url: ${KKPHIM_BASE_URL:https://phimapi.com}
    schedule-cron: ${CRAWLER_CRON:0 0 */6 * * *}
    enabled: ${CRAWLER_ENABLED:true}
  cache:
    ttl-minutes: ${CACHE_TTL:10}
  security:
    # Base64 encoded 256-bit secret key (32 bytes = 256 bits)
    jwt-secret: ${JWT_SECRET:dGFtZGFvLXdlYi1maWxtLXNlY3JldC1rZXktMjAyNi1wcm9kdWN0aW9uLXZlcnk=}
    jwt-expiration-ms: ${JWT_EXPIRATION:86400000}
  upload:
    avatar-dir: ${AVATAR_UPLOAD_DIR:uploads/avatars}
    base-url: ${APP_BASE_URL:http://localhost:8081/api}

# Logging
logging:
  level:
    root: INFO
    com.tamdao.webfilm: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${HIBERNATE_LOG_LEVEL:WARN}

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
