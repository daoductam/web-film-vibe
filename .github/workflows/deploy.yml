name: CICD CineStream Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'web-film-backend/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  # Sẽ được chuyển sang lowercase ở các bước build
  IMAGE_NAME: backend
  WORKING_DIR: web-film-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.WORKING_DIR }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/cinestream-backend:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Docker Compose to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "${{ env.WORKING_DIR }}/docker-compose.yml"
          target: "~/cinestream"
          strip_components: 1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/cinestream
            
            # Login to GitHub Container Registry on VPS
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Create .env file for secrets
            cat > .env << EOF
            DOCKER_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/cinestream-backend:latest"
            DATABASE_PASSWORD="${{ secrets.DB_PASSWORD }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            EOF
            
            # Pull and Restart
            docker compose pull
            docker compose up -d
            
            # Clean up dangling images
            docker image prune -f
